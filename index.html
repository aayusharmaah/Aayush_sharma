document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ryboard&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;,&quot;label&quot;:&quot;Scroll storyboard rail&quot;},&quot;floatingTickets&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;,&quot;label&quot;:&quot;Floating stat tickets&quot;},&quot;countUp&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;,&quot;label&quot;:&quot;Animate stat count-up&quot;},&quot;parallax&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;,&quot;label&quot;:&quot;Cursor parallax on hero&quot;}}\">\nclass Component extends DCLogic {\n  state = { role: 'product', counts: [0, 0, 0, 0], counted: false };\n\n  componentDidMount() {\n    const root = document.getElementById('asp-root');\n    if (!root) return;\n    this.root = root;\n    const p = this.props || {};\n    if (p.floatingTickets === false) root.querySelectorAll('.asp-ticket').forEach(t => t.style.display = 'none');\n    this.wireNav(root);\n    this.wireCounters(root, p);\n    this.wireParallax(root, p);\n    this.wireTilt(root);\n    this.wireSearch(root);\n    this.wireStory(root, p);\n  }\n\n  wireStory(root, p) {\n    const rail = root.querySelector('#asp-story');\n    const bar = root.querySelector('#asp-story-bar');\n    if (p.storyboard === false) { if (rail) rail.style.display = 'none'; if (bar) bar.style.display = 'none'; return; }\n    const chapters = [\n      ['asp-top', 'The Cover', '01'],\n      ['asp-work', 'Track Record', '02'],\n      ['asp-projects', 'Built Solo', '03'],\n      ['asp-skills', 'The Toolkit', '04'],\n      ['asp-wins', 'Receipts', '05'],\n      ['asp-contact', \"Let's Talk\", '06']\n    ];\n    const secEls = chapters.map(c => document.getElementById(c[0]));\n    const railFrames = [...root.querySelectorAll('#asp-story .asp-story-frame')];\n    const dockFrames = [...root.querySelectorAll('#asp-dock .asp-story-frame')];\n    const groups = [railFrames, dockFrames];\n    const fill = root.querySelector('#asp-story-fill');\n    const labelEl = root.querySelector('#asp-story-label');\n    const barFill = root.querySelector('#asp-story-bar-fill');\n    const dockLabel = root.querySelector('#asp-dock-label');\n\n    groups.forEach(g => g.forEach((f, i) => f.addEventListener('click', () => {\n      const el = secEls[i]; if (!el) return;\n      const y = el.getBoundingClientRect().top + window.scrollY - 60;\n      window.scrollTo({ top: Math.max(0, y), behavior: 'smooth' });\n    })));\n\n    const setFrame = (f, state) => {\n      const rot = f.dataset.rot || '0';\n      if (state === 'active') {\n        f.style.transform = 'rotate(0deg) scale(1.14)';\n        f.style.opacity = '1'; f.style.borderColor = '#7b2fff'; f.style.color = '#7b2fff';\n        f.style.background = 'linear-gradient(160deg,#fff,#f1ecff)';\n        f.style.boxShadow = '3px 3px 0 rgba(123,47,255,.22)';\n      } else if (state === 'done') {\n        f.style.transform = 'rotate(' + rot + 'deg) scale(.94)';\n        f.style.opacity = '.92'; f.style.borderColor = '#c3b2ec'; f.style.color = '#a07fe0';\n        f.style.background = '#fff'; f.style.boxShadow = '2px 2px 0 rgba(123,47,255,.12)';\n      } else {\n        f.style.transform = 'rotate(' + rot + 'deg) scale(.9)';\n        f.style.opacity = '.5'; f.style.borderColor = '#cbc3de'; f.style.color = '#9a93b0';\n        f.style.background = '#fff'; f.style.boxShadow = '2px 2px 0 rgba(19,17,31,.10)';\n      }\n    };\n\n    let active = -1;\n    const update = () => {\n      const de = document.documentElement;\n      const max = de.scrollHeight - window.innerHeight;\n      const prog = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;\n      if (fill) fill.style.height = (prog * 100) + '%';\n      if (barFill) barFill.style.width = (prog * 100) + '%';\n      const line = window.scrollY + window.innerHeight * 0.35;\n      let idx = 0;\n      secEls.forEach((el, i) => { if (el && (el.getBoundingClientRect().top + window.scrollY) <= line) idx = i; });\n      if (idx !== active) {\n        active = idx;\n        groups.forEach(g => g.forEach((f, i) => setFrame(f, i < idx ? 'done' : i === idx ? 'active' : 'idle')));\n        if (labelEl) labelEl.textContent = chapters[idx][1];\n        if (dockLabel) dockLabel.textContent = chapters[idx][2] + ' · ' + chapters[idx][1];\n      }\n    };\n    this._storyHandler = update;\n    window.addEventListener('scroll', update, { passive: true });\n    window.addEventListener('resize', update);\n    update();\n  }\n\n  wireSearch(root) {\n    const input = root.querySelector('#asp-q');\n    if (!input) return;\n    const countEl = root.querySelector('#asp-q-count');\n    const xps = [...root.querySelectorAll('.asp-xp')];\n    const projs = [...root.querySelectorAll('.asp-tilt')];\n    const chips = [...root.querySelectorAll('#asp-skills li')];\n    const xpTags = [\n      'business development growth crm funnel optimization conversion behavioral segmentation lead conversion sales client acquisition gold loan benchmarking pricing onboarding ux data analytics',\n      'product project genai generative ai workflow automation kpi frameworks ctr engagement retention tat content pipelines prompt design motion tools cross-functional delivery go-to-market',\n      'genai generative ai content pipelines no-code low-code workflow automation operating strategy talent frameworks product requirements prd growth acquisition delivery scale operations',\n      'staad pro autocad revit structural design excel content curation systems engineering'\n    ];\n    const projTags = [\n      'marketplace no-code low-code 0-1 product strategy user research go-to-market flatmate housing nextflat',\n      'creator economy supabase node node.js analytics data analytics rankings product strategy trendhona'\n    ];\n    const tagMap = new Map();\n    xps.forEach((el, i) => tagMap.set(el, (xpTags[i] || '') + ' ' + el.textContent.toLowerCase()));\n    projs.forEach((el, i) => tagMap.set(el, (projTags[i] || '') + ' ' + el.textContent.toLowerCase()));\n    const cards = [...xps, ...projs];\n\n    const reset = () => {\n      cards.forEach(c => { c.style.opacity = ''; c.style.outline = ''; c.style.outlineOffset = ''; });\n      chips.forEach(c => { c.style.opacity = ''; c.style.background = ''; c.style.color = ''; c.style.borderColor = ''; });\n      if (countEl) countEl.textContent = '';\n    };\n\n    const run = q => {\n      q = (q || '').trim().toLowerCase();\n      if (!q) { reset(); return []; }\n      const terms = q.split(/[\\s,]+/).filter(Boolean);\n      const hit = text => terms.some(t => text.includes(t));\n      const matched = [];\n      cards.forEach(c => {\n        if (hit(tagMap.get(c))) { matched.push(c); c.style.opacity = '1'; c.style.outline = '2px solid #7b2fff'; c.style.outlineOffset = '3px'; }\n        else { c.style.opacity = '.3'; c.style.outline = 'none'; }\n      });\n      chips.forEach(c => {\n        if (hit(c.textContent.toLowerCase())) { c.style.opacity = '1'; c.style.background = 'linear-gradient(120deg,#7b2fff,#a855f7)'; c.style.color = '#fff'; c.style.borderColor = 'transparent'; }\n        else { c.style.opacity = '.3'; c.style.background = ''; c.style.color = ''; c.style.borderColor = ''; }\n      });\n      if (countEl) {\n        const n = matched.length;\n        countEl.textContent = n\n          ? `Highlighted ${n} place${n > 1 ? 's' : ''} where I've put this to work — scroll down to see.`\n          : 'No direct match yet — try “GenAI”, “CRM”, “Supabase”, or “no-code”.';\n        countEl.style.color = n ? '#7b2fff' : '#b05a7a';\n      }\n      return matched;\n    };\n\n    const jump = matched => {\n      if (!matched[0]) return;\n      const y = matched[0].getBoundingClientRect().top + window.scrollY - 90;\n      window.scrollTo({ top: y, behavior: 'smooth' });\n    };\n\n    let t;\n    input.addEventListener('input', () => { clearTimeout(t); t = setTimeout(() => run(input.value), 80); });\n    input.addEventListener('keydown', e => { if (e.key === 'Enter') jump(run(input.value)); });\n    root.querySelectorAll('[data-fill]').forEach(b => b.addEventListener('click', () => {\n      input.value = b.getAttribute('data-fill');\n      input.focus();\n      jump(run(input.value));\n    }));\n  }\n\n  wireNav(root) {\n    const nav = root.querySelector('#asp-nav');\n    if (!nav) return;\n    const on = () => {\n      if (window.scrollY > 10) { nav.style.borderBottomColor = '#e9e6f2'; nav.style.boxShadow = '0 2px 20px rgba(60,40,120,.05)'; }\n      else { nav.style.borderBottomColor = 'transparent'; nav.style.boxShadow = 'none'; }\n    };\n    this._navHandler = on;\n    window.addEventListener('scroll', on, { passive: true });\n    on();\n  }\n\n  wireCounters(root, p) {\n    const box = root.querySelector('.asp-stats');\n    if (!box) return;\n    const targets = [25, 3, 99, 3];\n    const start = () => {\n      if (this.state.counted) return;\n      this.setState({ counted: true });\n      if (p.countUp === false) { this.setState({ counts: targets }); return; }\n      const t0 = performance.now(), dur = 1400;\n      const tick = now => {\n        const t = Math.min(1, (now - t0) / dur);\n        const e = 1 - Math.pow(1 - t, 3);\n        this.setState({ counts: targets.map(v => Math.round(v * e)) });\n        if (t < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    };\n    const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) start(); }), { threshold: .4 });\n    io.observe(box);\n  }\n\n  wireParallax(root, p) {\n    if (p.parallax === false) return;\n    const blobs = [...root.querySelectorAll('.asp-blob')];\n    if (!blobs.length) return;\n    const on = e => {\n      const cx = (e.clientX / window.innerWidth - .5), cy = (e.clientY / window.innerHeight - .5);\n      blobs.forEach((b, i) => { const f = (i + 1) * 16; b.style.transform = `translate(${cx * f}px,${cy * f}px)`; });\n    };\n    this._moveHandler = on;\n    window.addEventListener('mousemove', on, { passive: true });\n  }\n\n  wireTilt(root) {\n    if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;\n    const cards = [...root.querySelectorAll('.asp-tilt')];\n    cards.forEach(c => {\n      c.addEventListener('mousemove', e => {\n        const r = c.getBoundingClientRect();\n        const px = (e.clientX - r.left) / r.width - .5, py = (e.clientY - r.top) / r.height - .5;\n        c.style.transform = `perspective(820px) rotateX(${-py * 5}deg) rotateY(${px * 5}deg) translateY(-4px)`;\n        c.style.boxShadow = '0 24px 60px rgba(60,40,120,.16)';\n      });\n      c.addEventListener('mouseleave', () => { c.style.transform = 'none'; c.style.boxShadow = '0 1px 2px rgba(40,30,80,.06),0 4px 12px rgba(40,30,80,.05)'; });\n    });\n  }\n\n  componentWillUnmount() {\n    if (this._navHandler) window.removeEventListener('scroll', this._navHandler);\n    if (this._moveHandler) window.removeEventListener('mousemove', this._moveHandler);\n    if (this._storyHandler) { window.removeEventListener('scroll', this._storyHandler); window.removeEventListener('resize', this._storyHandler); }\n  }\n\n  renderVals() {\n    const role = this.state.role;\n    const c = this.state.counts;\n    const mk = r => ({\n      bg: role === r ? 'linear-gradient(120deg,#7b2fff,#a855f7)' : 'transparent',\n      col: role === r ? '#fff' : '#6f6885'\n    });\n    const P = {\n      product: ['Product:', 'aspiring PM with 2.5 yrs across AI content ops, client acquisition, and cross-functional delivery — specializing in GenAI workflows, KPI design, and systems that scale.'],\n      growth: ['Growth:', 'drove ₹25L+ in monthly disbursals at 80% lead conversion, and lifted campaign optimization speed 30% with KPI frameworks built from scratch.'],\n      bd: ['Business Dev:', 'acquires, benchmarks, and converts — from gold-loan pipelines at Federal Bank to translating client needs into deliverable scope across AI content services.'],\n      project: ['Project:', 'ran 15+ launches at 95%+ on-time, scaled output to 10+ assets/day at 99% reliability, and built the lean frameworks that made 2× scale possible without extra cost.']\n    };\n    return {\n      statA: '₹' + c[0] + 'L+', statB: c[1] + '×', statC: c[2] + '%', statD: '' + c[3],\n      pitchLabel: P[role][0], pitchBody: P[role][1],\n      btnProduct: mk('product'), btnGrowth: mk('growth'), btnBd: mk('bd'), btnProject: mk('project'),\n      pickProduct: () => this.setState({ role: 'product' }),\n      pickGrowth: () => this.setState({ role: 'growth' }),\n      pickBd: () => this.setState({ role: 'bd' }),\n      pickProject: () => this.setState({ role: 'project' })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
